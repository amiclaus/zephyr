description: |
  Analog Devices ADGM3053 4-channel crossover MEMS switch (DC-14GHz),
  SPI control mode.

  The ADGM3053 contains 4 MEMS switches controlled via a single SPI register
  at address 0x20 using 16-bit SPI frames (Mode 0, MSB-first, max 10MHz).

  Example:

    &spi1 {
      adgm3053: adgm3053@0 {
        compatible = "adi,adgm3053";
        reg = <0>;
        spi-max-frequency = <10000000>;
      };
    };

compatible: "adi,adgm3053"

include: spi-device.yaml
